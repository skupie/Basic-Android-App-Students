name: Android CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:          # lets you trigger a build manually from GitHub UI

jobs:
  build:
    name: Build & Sign APK / AAB
    runs-on: ubuntu-latest

    steps:

      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout source
        uses: actions/checkout@v4

      # ── 2. Java 17 (matches compileOptions in build.gradle.kts) ─────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── 3. Cache Gradle deps & build outputs ─────────────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.android/build-cache
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.toml', '**/*.kts', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # ── 4. Grant execute permission to gradlew ───────────────────────────────
      - name: Make gradlew executable
        run: chmod +x gradlew

      # ── 5. Decode keystore from GitHub Secret ────────────────────────────────
      #   In GitHub → Settings → Secrets → Actions, add:
      #     KEYSTORE_BASE64      → base64 of your .jks file
      #                            (run: base64 -w 0 your.keystore)
      #     KEY_STORE_PASSWORD   → storePassword
      #     KEY_ALIAS            → key alias
      #     KEY_PASSWORD         → keyPassword
      - name: Decode keystore
        if: github.event_name != 'pull_request'
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > $GITHUB_WORKSPACE/app/release.keystore

      # ── 6. Build debug APK (always — for PRs and pushes) ────────────────────
      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      # ── 7. Build release APK (signed, only on push to main/master) ──────────
      - name: Build release APK
        if: github.event_name != 'pull_request'
        run: ./gradlew assembleRelease --no-daemon --stacktrace
        env:
          SIGNING_STORE_FILE: ${{ github.workspace }}/app/release.keystore
          SIGNING_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      # ── 8. Build release AAB (for Play Store upload) ─────────────────────────
      - name: Build release AAB
        if: github.event_name != 'pull_request'
        run: ./gradlew bundleRelease --no-daemon --stacktrace
        env:
          SIGNING_STORE_FILE: ${{ github.workspace }}/app/release.keystore
          SIGNING_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      # ── 9. Upload debug APK artifact ─────────────────────────────────────────
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: StudentPortal-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

      # ── 10. Upload release APK artifact ──────────────────────────────────────
      - name: Upload release APK
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: StudentPortal-release-${{ github.run_number }}
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

      # ── 11. Upload release AAB artifact ──────────────────────────────────────
      - name: Upload release AAB
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: StudentPortal-release-aab-${{ github.run_number }}
          path: app/build/outputs/bundle/release/*.aab
          retention-days: 30
