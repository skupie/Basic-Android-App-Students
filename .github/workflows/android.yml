name: Android CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build & Sign APK / AAB
    runs-on: ubuntu-latest

    steps:

      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Bootstrap Gradle wrapper
        run: |
          # Download gradle-wrapper.jar
          mkdir -p StudentPortal/gradle/wrapper
          curl -fsSL \
            "https://github.com/gradle/gradle/raw/v8.6.0/gradle/wrapper/gradle-wrapper.jar" \
            -o StudentPortal/gradle/wrapper/gradle-wrapper.jar

          # Create gradlew script
          cat > StudentPortal/gradlew << 'EOF'
#!/bin/sh
APP_HOME=$(cd "$(dirname "$0")" && pwd -P)
CLASSPATH=$APP_HOME/gradle/wrapper/gradle-wrapper.jar
if [ -n "$JAVA_HOME" ]; then
  JAVACMD="$JAVA_HOME/bin/java"
else
  JAVACMD=java
fi
exec "$JAVACMD" \
  "-Dorg.gradle.appname=$(basename "$0")" \
  -classpath "$CLASSPATH" \
  org.gradle.wrapper.GradleWrapperMain "$@"
EOF

          # Make it executable
          chmod +x StudentPortal/gradlew

          echo "Bootstrap complete"
          ls -la StudentPortal/gradlew
          ls -la StudentPortal/gradle/wrapper/gradle-wrapper.jar

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('StudentPortal/**/*.toml', 'StudentPortal/**/*.kts', 'StudentPortal/**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Decode keystore
        if: github.event_name != 'pull_request'
        working-directory: StudentPortal
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/release.keystore

      - name: Build debug APK
        working-directory: StudentPortal
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Build release APK
        if: github.event_name != 'pull_request'
        working-directory: StudentPortal
        run: ./gradlew assembleRelease --no-daemon --stacktrace
        env:
          SIGNING_STORE_FILE: ${{ github.workspace }}/StudentPortal/app/release.keystore
          SIGNING_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Build release AAB
        if: github.event_name != 'pull_request'
        working-directory: StudentPortal
        run: ./gradlew bundleRelease --no-daemon --stacktrace
        env:
          SIGNING_STORE_FILE: ${{ github.workspace }}/StudentPortal/app/release.keystore
          SIGNING_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: StudentPortal-debug-${{ github.run_number }}
          path: StudentPortal/app/build/outputs/apk/debug/*.apk
          retention-days: 7

      - name: Upload release APK
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: StudentPortal-release-${{ github.run_number }}
          path: StudentPortal/app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Upload release AAB
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: StudentPortal-release-aab-${{ github.run_number }}
          path: StudentPortal/app/build/outputs/bundle/release/*.aab
          retention-days: 30
