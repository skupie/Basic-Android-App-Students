name: Android CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build & Sign APK / AAB
    runs-on: ubuntu-latest

    steps:

      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout source
        uses: actions/checkout@v4

      # ── 2. Java 17 ───────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. Download missing gradle-wrapper.jar ────────────────────────────────
      #   This file is binary so it cannot be committed as text.
      #   We download the exact version (8.6) declared in gradle-wrapper.properties.
      - name: Download gradle-wrapper.jar
        run: |
          mkdir -p StudentPortal/gradle/wrapper
          curl -L \
            "https://github.com/gradle/gradle/raw/v8.6.0/gradle/wrapper/gradle-wrapper.jar" \
            -o StudentPortal/gradle/wrapper/gradle-wrapper.jar
          echo "gradle-wrapper.jar size: $(wc -c < StudentPortal/gradle/wrapper/gradle-wrapper.jar) bytes"

      # ── 4. Make gradlew executable ───────────────────────────────────────────
      - name: Make gradlew executable
        working-directory: StudentPortal
        run: chmod +x gradlew

      # ── 5. Cache Gradle dependencies ─────────────────────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('StudentPortal/**/*.toml', 'StudentPortal/**/*.kts', 'StudentPortal/**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      # ── 6. Decode keystore ───────────────────────────────────────────────────
      #   Add these 4 secrets in: GitHub repo → Settings → Secrets → Actions
      #
      #   KEYSTORE_BASE64      base64 -w 0 your-keystore.jks   (paste output)
      #   KEY_STORE_PASSWORD   your storePassword
      #   KEY_ALIAS            your key alias
      #   KEY_PASSWORD         your keyPassword
      #
      - name: Decode keystore
        if: github.event_name != 'pull_request'
        working-directory: StudentPortal
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/release.keystore

      # ── 7. Build debug APK (every push & PR) ─────────────────────────────────
      - name: Build debug APK
        working-directory: StudentPortal
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      # ── 8. Build signed release APK (push to main/master only) ───────────────
      - name: Build release APK
        if: github.event_name != 'pull_request'
        working-directory: StudentPortal
        run: ./gradlew assembleRelease --no-daemon --stacktrace
        env:
          SIGNING_STORE_FILE: ${{ github.workspace }}/StudentPortal/app/release.keystore
          SIGNING_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      # ── 9. Build release AAB for Play Store (push to main/master only) ────────
      - name: Build release AAB
        if: github.event_name != 'pull_request'
        working-directory: StudentPortal
        run: ./gradlew bundleRelease --no-daemon --stacktrace
        env:
          SIGNING_STORE_FILE: ${{ github.workspace }}/StudentPortal/app/release.keystore
          SIGNING_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      # ── 10. Upload debug APK artifact ─────────────────────────────────────────
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: StudentPortal-debug-${{ github.run_number }}
          path: StudentPortal/app/build/outputs/apk/debug/*.apk
          retention-days: 7

      # ── 11. Upload release APK artifact ───────────────────────────────────────
      - name: Upload release APK
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: StudentPortal-release-${{ github.run_number }}
          path: StudentPortal/app/build/outputs/apk/release/*.apk
          retention-days: 30

      # ── 12. Upload release AAB artifact ───────────────────────────────────────
      - name: Upload release AAB
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: StudentPortal-release-aab-${{ github.run_number }}
          path: StudentPortal/app/build/outputs/bundle/release/*.aab
          retention-days: 30
